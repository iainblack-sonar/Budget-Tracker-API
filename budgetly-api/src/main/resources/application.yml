spring:
  application:
    name: budgetly

  datasource:
    url: jdbc:h2:mem:budgetly;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  h2:
    console:
      enabled: true
      path: /h2-console

budgetly:
  jwt:
    secret: budgetly-dev-secret-key-must-be-at-least-32-bytes-long
    expiration-ms: 86400000  # 24 hours

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/budgetly
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  h2:
    console:
      enabled: false

  flyway:
    locations: classpath:db/migration
